apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: clickncart

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers: 
        - name: mysql

          image: sumittiwari05/clickncart-mysql:latest

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MySQL_ROOT_PASSWORD

            - name: MYSQL_DATABASE
              value: clickNcart

          ports:
            - containerPort: 3306

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc